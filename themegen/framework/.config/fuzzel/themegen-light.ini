{{#themegen
let local.tg_001 = mix(color.light.surface_container_low, seed.color, 0.080000, hct, hex)
let local.tg_002 = alpha(local.tg_001, 95%, raw)
let local.tg_003 = alpha(color.light.on_surface, 100%, raw)
let local.tg_004 = alpha(color.light.primary, 100%, raw)
let local.tg_005 = alpha(color.light.on_surface_variant, 100%, raw)
let local.tg_006 = alpha(color.light.secondary_container, 100%, raw)
let local.tg_007 = alpha(color.light.on_secondary_container, 100%, raw)
let local.tg_008 = readable(color.light.primary, color.light.secondary_container, 4.500000, hct, hex)
let local.tg_009 = alpha(local.tg_008, 100%, raw)
}}
[main]
terminal=ghostty
layer=overlay
width=48
lines=12
tabs=4
font=Cascadia Code NF:size=14
icon-theme=Papirus

[colors]
background={{local.tg_002}}
text={{local.tg_003}}
prompt={{local.tg_004}}
placeholder={{local.tg_005}}
input={{local.tg_003}}
match={{local.tg_004}}
selection={{local.tg_006}}
selection-text={{local.tg_007}}
selection-match={{local.tg_009}}
counter={{local.tg_005}}
border={{local.tg_004}}

[border]
width=2
radius=8
