[main]
terminal=ghostty
layer=overlay
width=48
lines=12
tabs=4
font=Cascadia Code NF:size=14
icon-theme=Papirus

[colors]
background={{color.light.surface_container_low | to_hct() | mix(seed.color | to_hct(), 0.080000) | to_hex() | with_alpha(95%) | to_raw_hex()}}
text={{color.light.on_surface | with_alpha(100%) | to_raw_hex()}}
prompt={{color.light.primary | with_alpha(100%) | to_raw_hex()}}
placeholder={{color.light.on_surface_variant | with_alpha(100%) | to_raw_hex()}}
input={{color.light.on_surface | with_alpha(100%) | to_raw_hex()}}
match={{color.light.primary | with_alpha(100%) | to_raw_hex()}}
selection={{color.light.secondary_container | with_alpha(100%) | to_raw_hex()}}
selection-text={{color.light.on_secondary_container | with_alpha(100%) | to_raw_hex()}}
selection-match={{color.light.primary | to_hct() | readable(color.light.secondary_container, 4.500000) | with_alpha(100%) | to_raw_hex()}}
counter={{color.light.on_surface_variant | with_alpha(100%) | to_raw_hex()}}
border={{color.light.primary | with_alpha(100%) | to_raw_hex()}}

[border]
width=2
radius=8
