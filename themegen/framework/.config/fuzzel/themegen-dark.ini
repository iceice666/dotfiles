{{#themegen
let local.tg_001 = alpha(color.dark.surface_container_low, 95%, raw)
let local.tg_002 = alpha(color.dark.on_surface, 100%, raw)
let local.tg_003 = alpha(color.dark.primary, 100%, raw)
let local.tg_004 = alpha(color.dark.on_surface_variant, 100%, raw)
let local.tg_005 = alpha(color.dark.secondary_container, 100%, raw)
let local.tg_006 = alpha(color.dark.on_secondary_container, 100%, raw)
let local.tg_007 = readable_alpha(color.dark.primary, color.dark.secondary_container, 4.500000, 100%, hct, raw)
}}
[main]
terminal=ghostty
layer=overlay
width=48
lines=12
tabs=4
font=Cascadia Code NF:size=14
icon-theme=Papirus-Dark

[colors]
background={{local.tg_001}}
text={{local.tg_002}}
prompt={{local.tg_003}}
placeholder={{local.tg_004}}
input={{local.tg_002}}
match={{local.tg_003}}
selection={{local.tg_005}}
selection-text={{local.tg_006}}
selection-match={{local.tg_007}}
counter={{local.tg_004}}
border={{local.tg_003}}

[border]
width=2
radius=8
