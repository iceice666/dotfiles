[main]
terminal=ghostty
layer=overlay
width=48
lines=12
tabs=4
font=Cascadia Code NF:size=14
icon-theme=Papirus-Dark

[colors]
background={{color.dark.surface_container_low | with_alpha(95%) | to_raw_hex()}}
text={{color.dark.on_surface | with_alpha(100%) | to_raw_hex()}}
prompt={{color.dark.primary | with_alpha(100%) | to_raw_hex()}}
placeholder={{color.dark.on_surface_variant | with_alpha(100%) | to_raw_hex()}}
input={{color.dark.on_surface | with_alpha(100%) | to_raw_hex()}}
match={{color.dark.primary | with_alpha(100%) | to_raw_hex()}}
selection={{color.dark.secondary_container | with_alpha(100%) | to_raw_hex()}}
selection-text={{color.dark.on_secondary_container | with_alpha(100%) | to_raw_hex()}}
selection-match={{color.dark.primary | to_hct() | readable(color.dark.secondary_container, 4.500000) | with_alpha(100%) | to_raw_hex()}}
counter={{color.dark.on_surface_variant | with_alpha(100%) | to_raw_hex()}}
border={{color.dark.primary | with_alpha(100%) | to_raw_hex()}}

[border]
width=2
radius=8
