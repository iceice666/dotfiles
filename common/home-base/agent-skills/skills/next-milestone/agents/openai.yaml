interface:
  display_name: "Next Milestone"
  short_description: "Implement the next milestone, audit, fix, verify, and commit."
  default_prompt: "Use $next-milestone to find the next uncompleted milestone, stop for user discussion if the documented task is ambiguous, implement it, run a structured review for bugs and project-convention violations, apply all fixes, verify build+test+lint+fmt, mark it done, commit the final state, and present only the committed diff and bug summary."
