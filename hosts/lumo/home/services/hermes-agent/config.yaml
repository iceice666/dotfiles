model:
  provider: "custom"
  default: "gpt-5.5"
  base_url: "@cliproxyapiBaseUrl@"
  api_mode: "chat_completions"

fallback_providers:
  - provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"

model_aliases:
  daily:
    provider: "custom"
    model: "gpt-5.5"
    base_url: "@cliproxyapiBaseUrl@"
  heavy:
    provider: "custom"
    model: "gpt-5.5"
    base_url: "@cliproxyapiBaseUrl@"
  cheap:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
  openai-heavy:
    provider: "custom"
    model: "gpt-5.5"
    base_url: "@cliproxyapiBaseUrl@"
  coding-plan:
    provider: "custom"
    model: "gpt-5.5"
    base_url: "@cliproxyapiBaseUrl@"
  code-review:
    provider: "custom"
    model: "codex-auto-review"
    base_url: "@cliproxyapiBaseUrl@"

auxiliary:
  compression:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 120
    fallback_chain:
      - provider: "custom"
        model: "gpt-5.4-mini"
        base_url: "@cliproxyapiBaseUrl@"
  web_extract:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 360
  title_generation:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 30
    language: ""
  approval:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 30
  skills_hub:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 30
  mcp:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 30
  triage_specifier:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 120
  kanban_decomposer:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 120
  profile_describer:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 30
  curator:
    provider: "custom"
    model: "gpt-5.4-mini"
    base_url: "@cliproxyapiBaseUrl@"
    api_key: "${OPENAI_API_KEY}"
    timeout: 120

skills:
  write_approval: true

terminal:
  backend: "local"
  cwd: "/opt/workspace"
  timeout: 180

memory:
  provider: "honcho"
  memory_enabled: true
  user_profile_enabled: true
  write_approval: true

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
  mcp_reload_confirm: true
  destructive_slash_confirm: true

goals:
  max_turns: 8

cron:
  wrap_response: true
  script_timeout_seconds: 120

tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000
