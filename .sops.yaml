# .sops.yaml (repo root)
# Public file: contains only public recipients / fingerprints and matching rules.

keys:
  # Per-device age recipients (public)
  - &m3air         age1dkgvxcx5x4a303pxy2zl92a63fhvf95jyu6wha3pw4g97qffq43ql6xa8k
  - &framework     age1cxxr5xe7u7zxepf7y4eka07m856dx9hqwynu6jyf9xftc7q53ulqd997ah
  - &homolab       age1r80n348lhctp82j7vuj6fe6hs6sup7lz7x66nh80xunrsrg2sqrqh98zpu
  - &homolab-home  age12ddymngsg3ql50ym086smjcvj9ewmy4mhhz47yepwd00z8dcnypqatdk65
  - &lumo          age1eqr9wgdsa2tfkck96guuxclu8vr0la62sju6yjkzvd9667uxrugs9kyync
  - &worker        age1qfnqaz2pwlgx27ymm5wa4h4gs55nx2tt2hjjkg209t5hstdqp9yqvh2kck
  # Optional recovery recipient (public)
  # - &recovery    age1rrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrr

creation_rules:
  # Shared secrets: decryptable on all three devices (+ recovery)
  - path_regex: ^sensitive/shared/.*\.(yaml|yml|json|env|ini|key|pem)$
    age:
      - *m3air
      - *framework
      - *homolab
      - *homolab-home
      - *lumo
      # - *recovery

  # Per-host secrets
  - path_regex: ^sensitive/hosts/m3air/.*\.(yaml|yml|json|env|ini|key|pem)$
    age: [*m3air]

  - path_regex: ^sensitive/hosts/framework/.*\.(yaml|yml|json|env|ini|key|pem)$
    age: [*framework]

  # Homolab home-user secrets: editable from m3air, decryptable by the home user on homolab
  - path_regex: ^sensitive/hosts/homolab/home/.*\.(yaml|yml|json|env|ini|key|pem)$
    age:
      - *m3air
      - *homolab-home

  # Homolab system secrets: editable from m3air, decryptable by the system on homolab
  - path_regex: ^sensitive/hosts/homolab/.*\.(yaml|yml|json|env|ini|key|pem)$
    age:
      - *m3air
      - *homolab

  - path_regex: ^sensitive/hosts/lumo/.*\.(yaml|yml|json|env|ini|key|pem)$
    age:
      - *m3air
      - *lumo

  - path_regex: ^sensitive/hosts/worker/.*\.(yaml|yml|json|env|ini|key|pem)$
    age:
      - *m3air
      - *worker
