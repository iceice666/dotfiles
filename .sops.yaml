# .sops.yaml (repo root)
# Public file: contains only public recipients / fingerprints and matching rules.

keys:
  # Per-device age recipients (public)
  - &m3air age1dkgvxcx5x4a303pxy2zl92a63fhvf95jyu6wha3pw4g97qffq43ql6xa8k
  - &framework age1c27ha4s5d890vmztrw2fyd6qzhg9x9m0mscmfj7yqqj4u3ur730s9p36lp
  # Optional recovery recipient (public)
  # - &recovery age1rrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrr

creation_rules:
  # Shared secrets: decryptable on all three devices (+ recovery)
  - path_regex: ^sensitive/shared/.*\.(yaml|yml|json|env|ini|key)$
    age:
      - *m3air
      - *framework
      # - *recovery

  # Per-device secrets: only the device (+ recovery)
  - path_regex: ^sensitive/hosts/m3air/.*\.(yaml|yml|json|env|ini|key)$
    age: [*m3air]

  - path_regex: ^sensitive/hosts/framework/.*\.(yaml|yml|json|env|ini|key)$
    age: [*framework]
