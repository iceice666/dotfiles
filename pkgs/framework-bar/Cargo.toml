[package]
name = "framework-bar"
version = "0.1.0"
edition = "2024"

[lib]
name = "framework_bar"
path = "src/lib.rs"

[[bin]]
name = "framework-bar"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
chrono = "0.4.42"
clap = { version = "4.6.1", features = ["derive"] }
fs2 = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
walkdir = "2.5.0"
iced = { version = "0.14", features = ["svg", "image", "canvas", "tokio", "advanced"] }
iced_layershell = "0.18"
system-tray = "0.8"
tokio = { version = "1.48.0", features = ["sync", "net", "time"] }
futures = "0.3.31"
